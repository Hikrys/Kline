<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比特鹰 多交易所 K 线系统</title>
    <!-- 引入图表库 -->
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="header">
    <div class="title">🦅 比特鹰 多交易所 K 线系统</div>
    <div class="controls">
        <span class="status" id="ws-status">🟡 正在初始化...</span>
        <span id="ticker-info" style="font-size: 15px; font-weight: bold; margin-right: 15px;"></span>
        <select id="interval-select" onchange="onConfigChange()">
            <option value="1m" selected>1分钟 (1m)</option>
            <option value="5m">5分钟 (5m)</option>
            <option value="15m">15分钟 (15m)</option>
            <option value="1h">1小时 (1h)</option>
            <option value="4h">4小时 (4h)</option>
            <option value="1d">1天 (1d)</option>
        </select>
        <input type="text" id="symbol-input" list="symbol-list" value="binance:BTC/USDT" placeholder="搜索交易所或币种..." onchange="onConfigChange()">
        <datalist id="symbol-list"></datalist>
    </div>
</div>

<div id="chart-container">
    <div class="legend" id="legend">加载数据中...</div>
</div>

<script src="/static/app.js"></script>

</body>
</html>
