system:
  use_proxy: true
  # 用 host.docker.internal 穿透容器，连接宿主机的 10809 代理
  proxy_url: "http://host.docker.internal:10809"
  debug: false

database:
  url: "http://influxdb:8086"
  token: "my-super-secret-auth-token-for-kline"
  org: "kline_org"
  bucket: "kline_bucket"

server:
  host: "0.0.0.0"
  port: 8000

redis:
  url: "redis://redis:6379"